databases:
  - name: peerlearn-db
    plan: free
    databaseName: peerlearn
    user: peerlearn

services:
  - type: web
    name: rohan-rony-peerlearn-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: peerlearn-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SIMULATE_PAYMENTS
        value: "true"
      - key: CLIENT_URL
        value: https://rohan-rony-peerlearn-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://rohan-rony-peerlearn-frontend.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  - type: web
    name: rohan-rony-peerlearn-frontend
    env: static
    rootDir: .
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://rohan-rony-peerlearn-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
