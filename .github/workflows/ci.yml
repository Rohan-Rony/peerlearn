name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  backend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backend
      - run: node --check src/server.js
        working-directory: backend
      - run: node --check src/routes/auth.js
        working-directory: backend
      - run: node --check src/routes/courses.js
        working-directory: backend
      - run: node --check src/routes/sessions.js
        working-directory: backend
